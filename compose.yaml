services:

  fleecetv_bd:
    image: postgres:16
    container_name: fleeceTV_bd
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" 
    volumes: 
      - ${DB_DATA_PATH}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5


  fleecetv_api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: fleeceTV_api
    restart: always
    depends_on:
      - fleecetv_bd
    ports:
      - "8000:8000"
      - "53317:53317/tcp"
      - "53317:53317/udp"
    environment:
      MEDIA_PATH: /media
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@fleeceTV_bd:5432/${POSTGRES_DB}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TMDB_BASE_URL: ${TMDB_BASE_URL}
      JACKETT_KEY: ${JACKETT_KEY}
    volumes:
      - ${NAS_PATH}:/media:rw
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1


  jackett:
    image: lscr.io/linuxserver/jackett
    container_name: jackett
    restart: unless-stopped
    ports:
      - "9117:9117"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./src/api/config/jackett:/config


  fleecetv_portal:
    build:
      context: .
      dockerfile: src/portal/Dockerfile 
    container_name: fleeceTV_portal
    environment:
      FLEECETV_API_URL: ${FLEECETV_API_URL}
    restart: always
    depends_on:
      - fleecetv_api
    ports:
      - "8080:80"

